<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class 9 Mathematics | Unit 1 - Real Numbers</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <style>
      :root {
        --paper: #f7f4ef;
        --sheet: #fffdf9;
        --line: #ded7cc;
        --muted: #6a655e;
        --ink: #1f1c18;
        --accent: #1e5d4d;
        --accent-soft: #e8f2ee;
        --gold: #9a6c2f;
        --gold-soft: #f6efe3;
        --link: #275ea8;
        --radius: 16px;
        --shadow: 0 8px 30px rgba(31, 28, 24, 0.05);
        --serif: Georgia, "Times New Roman", serif;
        --sans: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        --circle-question: 38px;
        --circle-option: 38px;
        --circle-toggle: 36px;
        --footnote-badge-size: 1.3rem;
        --footnote-badge-font: 0.72rem;
      }

      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .top {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(247, 244, 239, 0.94);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
      }
      .topin {
        max-width: 1040px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        font-family: var(--serif);
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--accent);
      }
      .topnav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .topnav a:hover {
        color: var(--accent);
      }
      .page {
        max-width: 1040px;
        margin: 0 auto;
        padding: 28px 20px 56px;
      }
      .chapter-intro {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 18px;
        align-items: start;
        margin-bottom: 18px;
      }
      .chapter-intro > div {
        background: var(--sheet);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 22px;
      }
      .kicker {
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 6px;
      }
      .chapter-intro h1 {
        font-family: var(--serif);
        font-size: 2.2rem;
        line-height: 1.05;
        letter-spacing: -0.03em;
        margin: 0 0 10px;
      }
      .chapter-intro p {
        margin: 0;
        color: #4c4740;
        max-width: 62ch;
      }
      .intro-tools input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        outline: none;
      }
      .intro-tools input:focus {
        border-color: var(--accent);
      }
      .tool-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }
      .tool-btn {
        appearance: none;
        border: 1px solid var(--line);
        background: #fff;
        padding: 10px 14px;
        border-radius: 999px;
        font: 600 0.92rem var(--sans);
        color: var(--ink);
        cursor: pointer;
      }
      .tool-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .tool-btn.iconprint,
      .rbtn.iconprint,
      .abtn.iconprint {
        width: 38px;
        height: 38px;
        padding: 0;
        border-radius: 999px;
        display: inline-grid;
        place-items: center;
      }
      .tool-btn.iconprint svg,
      .rbtn.iconprint svg,
      .abtn.iconprint svg {
        width: 16px;
        height: 16px;
        display: block;
      }
      .jumpbar {
        position: sticky;
        top: 64px;
        z-index: 40;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        background: rgba(247, 244, 239, 0.96);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 10px 12px;
        margin-bottom: 24px;
        box-shadow: var(--shadow);
      }
      .jumpbar a {
        padding: 7px 12px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid var(--line);
        font-size: 0.9rem;
        color: #4f4a43;
      }
      .jumpbar a:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .chapter-flow section {
        margin-bottom: 26px;
      }
      .ph {
        padding: 18px 0 12px;
        border-bottom: 2px solid #c9c1b5;
        margin-bottom: 18px;
      }
      .lb {
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 5px;
      }
      .ph h2 {
        font-family: var(--serif);
        font-size: 1.9rem;
        line-height: 1.1;
        margin: 0;
      }
      .ds {
        margin-top: 7px;
        color: var(--muted);
        font-size: 0.93rem;
      }
      .reading-note {
        background: var(--gold-soft);
        border: 1px solid #ead9bc;
        color: #705127;
        padding: 12px 14px;
        border-radius: 14px;
        margin: 14px 0 18px;
        font-size: 0.92rem;
      }
      .concepts {
        background: var(--sheet);
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .concepts-hdr {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 18px;
        background: #fbf8f2;
        cursor: pointer;
        user-select: none;
      }
      .concepts-hdr .title {
        font-family: var(--serif);
        font-size: 1.02rem;
        font-weight: 700;
        color: var(--accent);
        flex: 1;
      }
      .concepts-hdr .arrow {
        transition: transform 0.22s ease;
        color: var(--accent);
      }
      .concepts.open .concepts-hdr .arrow {
        transform: rotate(180deg);
      }
      .concepts-body {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s ease;
      }
      .concepts.open .concepts-body {
        max-height: 12000px;
      }
      .concepts-inner {
        padding: 18px 20px 20px;
        font-size: 1rem;
        color: #3f3a34;
      }
      .concepts-inner h4 {
        font-family: var(--serif);
        font-size: 1.06rem;
        margin: 14px 0 4px;
        color: var(--ink);
      }
      .concepts-inner h4:first-child {
        margin-top: 0;
      }
      .concepts-inner p {
        margin: 0 0 8px;
      }
      .sl {
        font-family: var(--serif);
        font-size: 1.25rem;
        font-weight: 700;
        margin: 26px 0 12px;
        color: var(--ink);
      }
      .qb {
        background: var(--sheet);
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: var(--shadow);
        margin-bottom: 12px;
      }
      .qh {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 16px 18px;
        cursor: pointer;
      }
      .qn {
        width: var(--circle-question);
        height: var(--circle-question);
        min-width: var(--circle-question);
        min-height: var(--circle-question);
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--accent-soft);
        color: var(--accent);
        font: 800 0.9rem/1 var(--sans);
        font-variant-numeric: tabular-nums;
        flex: 0 0 var(--circle-question);
        margin-top: 0;
      }
      .qn[data-len="2"],
      .paper-qnum[data-len="2"] {
        font-size: 0.82rem;
      }
      .qn[data-len="3"],
      .paper-qnum[data-len="3"] {
        font-size: 0.74rem;
        letter-spacing: -0.01em;
      }
      .qn[data-len="4"],
      .paper-qnum[data-len="4"] {
        font-size: 0.68rem;
        letter-spacing: -0.02em;
      }
      .qn[data-len="5"],
      .paper-qnum[data-len="5"] {
        font-size: 0.62rem;
        letter-spacing: -0.02em;
      }
      .qt {
        flex: 1;
        font-size: 1rem;
        color: #2e2a26;
        display: block;
        line-height: 1.6;
        min-height: 32px;
        padding-top: 2px;
        padding-bottom: 2px;
      }
      .qt .katex {
        vertical-align: middle;
        margin-left: 0.08em;
        margin-right: 0.08em;
      }
      .qt .katex-display {
        display: inline-flex !important;
        justify-content: center;
        vertical-align: middle;
        margin: 0.1em 0.12em !important;
      }
      .qt .katex-display > .katex {
        max-width: 100%;
        text-align: center;
      }
      .test-list .katex,
      .test-head .katex,
      .gout .katex {
        vertical-align: middle;
        margin-left: 0.06em;
        margin-right: 0.06em;
      }
      .qg {
        width: var(--circle-toggle);
        height: var(--circle-toggle);
        min-width: var(--circle-toggle);
        min-height: var(--circle-toggle);
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: #f1ece4;
        color: #7b746a;
        flex: 0 0 var(--circle-toggle);
        transition: all 0.2s;
      }
      .qg svg {
        width: 15px;
        height: 15px;
        transition: transform 0.2s;
      }
      .qb.open .qg {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .qb.open .qg svg {
        transform: rotate(180deg);
      }
      .qs {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s ease;
      }
      .qb.open .qs {
        max-height: 16000px;
      }
      .si {
        padding: 0 18px 18px calc(18px + var(--circle-question) + 12px);
      }
      .qb-solution-only .si {
        padding-left: 18px;
      }
      .slb {
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        margin-bottom: 8px;
      }
      .slb-inline {
        margin: 0;
      }
      .qh-solution-only {
        padding-top: 14px;
        padding-bottom: 14px;
      }
      .qt-solution-only {
        display: flex;
        align-items: center;
        min-height: auto;
        padding-top: 0;
        padding-bottom: 0;
      }
      .sc {
        font-size: 1rem;
        color: #3f3a34;
        line-height: 1.85;
      }
      .sc p {
        margin: 0 0 8px;
      }
      .sc .note {
        background: #f8f5ef;
        border-left: 3px solid var(--accent);
        padding: 11px 13px;
        border-radius: 12px;
        margin: 10px 0;
        font-size: 0.94rem;
      }
      .mb {
        display: block;
        text-align: center;
        margin: 10px 0;
        overflow-x: auto;
        padding: 2px 0;
      }
      .eq-block {
        display: block;
        margin: 10px 0;
        overflow-x: auto;
        padding: 2px 0;
      }
      .eq-block .katex-display {
        margin: 0.35em 0;
        display: flex;
        justify-content: center;
        overflow-x: auto;
      }
      .eq-block .katex-display > .katex {
        max-width: 100%;
        text-align: center;
      }
      .plain-block-math {
        display: block;
        margin: 10px 0;
        overflow-x: auto;
        padding: 2px 0;
        text-align: center;
      }
      .plain-block-math .katex-display {
        margin: 0.35em 0;
        display: flex;
        justify-content: center;
        overflow-x: auto;
      }
      .plain-block-math .katex-display > .katex {
        max-width: 100%;
        text-align: center;
      }
      .katex {
        font-size: 1em !important;
      }
      .mb .katex-display {
        margin: 0.35em 0;
      }
      .mo {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      .mop {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border: 1.5px solid var(--line);
        border-radius: 12px;
        background: #fff;
        cursor: pointer;
        transition: all 0.18s ease;
        font-size: 0.95rem;
      }
      .mop:hover {
        border-color: var(--accent);
        background: #fbfefc;
      }
      .ml {
        width: var(--circle-option);
        height: var(--circle-option);
        min-width: var(--circle-option);
        min-height: var(--circle-option);
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: #f2ede6;
        font: 800 0.76rem/1 var(--sans);
        font-variant-numeric: tabular-nums;
        color: #625c54;
        flex: 0 0 var(--circle-option);
      }
      .mop.ok {
        border-color: var(--accent);
        background: var(--accent-soft);
      }
      .mop.ok .ml {
        background: var(--accent);
        color: #fff;
      }
      .mop.no {
        border-color: #be4b49;
        background: #fbefee;
      }
      .mop.no .ml {
        background: #be4b49;
        color: #fff;
      }
      .mex {
        display: none;
        margin-top: 10px;
        background: #f7f3eb;
        border-left: 3px solid var(--gold);
        padding: 10px 12px;
        border-radius: 12px;
        color: #5d4f37;
        font-size: 0.93rem;
      }
      .mex.show {
        display: block;
      }
      .test-block {
        background: var(--sheet);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 16px 18px;
        margin-bottom: 12px;
      }
      .test-head {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 12px;
        align-items: baseline;
        margin-bottom: 10px;
      }
      .test-head strong {
        font-size: 1rem;
        color: var(--accent);
      }
      .test-head span {
        font-family: var(--serif);
        font-size: 1.05rem;
        font-weight: 700;
      }
      .test-head em {
        font-size: 0.9rem;
        color: var(--muted);
        font-style: normal;
      }
      .test-list {
        margin: 0;
        padding-left: 22px;
        color: #36312c;
      }
      .test-list li {
        margin: 7px 0;
      }
      .test-list.alpha {
        list-style-type: lower-alpha;
      }
      .footer-note {
        margin-top: 28px;
        text-align: center;
        color: var(--muted);
        font-size: 0.92rem;
      }
      @media (max-width: 860px) {
        .chapter-intro {
          grid-template-columns: 1fr;
        }
        .jumpbar {
          top: 60px;
        }
        .mo {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 620px) {
        .topin {
          padding: 12px 14px;
          align-items: flex-start;
          flex-direction: column;
        }
        .page {
          padding: 18px 14px 44px;
        }
        .chapter-intro h1 {
          font-size: 1.7rem;
        }
        .ph h2 {
          font-size: 1.5rem;
        }
        .qh {
          padding: 14px 14px;
        }
        .si {
          padding: 0 14px 16px calc(14px + var(--circle-question) + 12px);
        }
        .qb-solution-only .si {
          padding-left: 14px;
        }
        .jumpbar {
          position: static;
        }
      }
      @media print {
        .top,
        .jumpbar,
        .intro-tools {
          display: none !important;
        }
        body {
          background: #fff;
        }
        .page {
          max-width: none;
          padding: 0;
        }
        .qb,
        .concepts,
        .test-block,
        .chapter-intro > div {
          box-shadow: none;
          border-color: #bbb;
        }
        .qs {
          max-height: none !important;
        }
        .qb,
        .concepts {
          page-break-inside: avoid;
        }
      }

      /* enhancement layer */
      .topnav a.current {
        color: var(--accent);
        font-weight: 700;
      }
      .printmini,
      .headbtn {
        appearance: none;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--muted);
        border-radius: 999px;
        padding: 7px 11px;
        font: 600 0.82rem var(--sans);
        cursor: pointer;
      }
      .printmini:hover,
      .headbtn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .qh-tools {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-left: auto;
        padding-left: 8px;
      }
      .qh-tools .printmini {
        padding: 6px 10px;
      }
      .iconprint {
        width: 36px;
        height: 36px;
        padding: 0 !important;
        border-radius: 999px !important;
        display: inline-grid !important;
        place-items: center;
        line-height: 1;
      }
      .iconprint svg {
        width: 16px;
        height: 16px;
        display: block;
      }
      .math-fallback {
        display: inline-block;
        padding: 0 0.35em;
        border-radius: 6px;
        background: #fff7e6;
        color: #6f541c;
        font: 500 0.92em var(--mono);
      }
      .ph-tools,
      .test-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .search-note {
        margin-top: 10px;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .search-note strong {
        color: var(--accent);
      }
      .detail-standard {
        margin: 18px 0 6px;
        background: linear-gradient(180deg, #fffdf9, #fff);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px 18px;
        box-shadow: var(--shadow);
      }
      .detail-standard h3 {
        margin: 0 0 8px;
        font-family: var(--serif);
        font-size: 1.08rem;
      }
      .detail-standard p {
        margin: 0 0 12px;
        color: #4a453e;
        font-size: 0.94rem;
        line-height: 1.78;
      }
      .detail-points {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .detail-points div {
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        font-size: 0.86rem;
        color: #4a453e;
        line-height: 1.7;
      }
      .detail-points strong {
        color: var(--ink);
      }
      .tikz-wrap {
        margin: 14px 0 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        overflow-x: auto;
      }
      .tikz-wrap svg {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 0 auto;
      }
      .search-muted {
        opacity: 0.45;
      }
      .gi {
        background: var(--sheet);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
      }
      .gi h3 {
        margin: 0 0 6px;
        font-family: var(--serif);
        font-size: 1.35rem;
      }
      .gi p {
        margin: 0;
        color: #4c4740;
      }
      .gf {
        background: var(--sheet);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: var(--shadow);
      }
      .gr {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 12px;
      }
      .gfl label {
        display: block;
        font-size: 0.76rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 6px;
      }
      .gfl select,
      .gfl input[type="number"] {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        outline: none;
      }
      .gfl select:focus,
      .gfl input[type="number"]:focus {
        border-color: var(--accent);
      }
      .gps {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 16px;
      }
      .pb {
        appearance: none;
        border: 1px solid var(--line);
        background: #fff;
        padding: 8px 14px;
        border-radius: 999px;
        font: 600 0.88rem var(--sans);
        cursor: pointer;
        color: #4b463f;
      }
      .pb:hover,
      .pb.act {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-soft);
      }
      .gb,
      .rbtn,
      .abtn {
        appearance: none;
        border: none;
        background: var(--accent);
        color: #fff;
        border-radius: 12px;
        padding: 12px 16px;

      function escHtml(s) {

          .replace(/(^|[^\\A-Za-z])cdot(?=[^A-Za-z]|$)/g, "$1\\cdot")
          .replace(/\^\{(-?\d+)\/(\d+)\}/g, (_, a, b) =>
            a.startsWith("-")
              ? `^{-\\frac{${a.slice(1)}}{${b}}}`
              : `^{\\frac{${a}}{${b}}}`,

          .replace(/\^(-?\d+)\/(\d+)/g, (_, a, b) =>
            a.startsWith("-")

      function previousTextAlreadyExplainsRule(prevText, whyHtml, latex = "") {

        const why = String(whyHtml || "")
          .replace(/<[^>]+>/g, " ")

          /(using|apply|by applying) the (identity|formula|theorem|rule|method)/.test(
            prev,

          /(multiply both|multiply the numerator and the denominator|multiply the numerator and denominator).+conjugate/.test(
            prev,

          /let the repeating decimal be a variable/.test(prev);
        const exactOverlap =
          (why.includes("perfect square identity") && /identity/.test(prev)) ||
          (why.includes("difference of squares") &&
            /difference of squares|identity/.test(prev)) ||
          (why.includes("conjugate") && /conjugate/.test(prev)) ||
          (why.includes("power of a power") &&
            /power of a power|rule/.test(prev)) ||
          (why.includes("negative exponent") &&
            /negative exponent|rule/.test(prev)) ||
          (why.includes("product rule for radicals") &&
            /product rule|radical/.test(prev)) ||
          (why.includes("division property of equality") &&
            /divide both sides|division property/.test(prev));

          String(latex || ""),

            /identity|formula|theorem|rule|method|conjugate/.test(prev))

<h4>Laws of Indices</h4>

      function selMCQ(prefix, qi, oi) {
        const data = prefix === "r" ? RMCQ : UTMCQ;

        opts.forEach((o) => (o.style.pointerEvents = "none"));

        }

      function shuf(a) {
        const b = [...a];
        for (let i = b.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [b[i], b[j]] = [b[j], b[i]];
        }
        return b;
      }
      function selectBank(arr, topic) {
        return topic === "all"

      function getWhyBody(el) {
        var r = null;
        if (
          el.nextElementSibling &&
          (el.nextElementSibling.classList.contains("step-reason") ||
            el.nextElementSibling.classList.contains("eq-note-body"))
        ) {
          r = el.nextElementSibling;
        }
        if (!r) {
          var p =
            el.closest("p") ||
            el.closest(".why-row") ||
            el.closest(".eq-note-row") ||
            el.parentElement;
          var candidate = p ? p.nextElementSibling : null;
          if (
            candidate &&
            (candidate.classList.contains("step-reason") ||
              candidate.classList.contains("eq-note-body"))
          ) {
            r = candidate;
          }
        }
        if (!r) {
          var container =
            el.closest(".sc, .si, .mex, .auto-why-block") || document;
          var reasons = container.querySelectorAll(
            ".step-reason, .eq-note-body",
          );
          var whys = container.querySelectorAll(".step-why, .eq-note-toggle");
          var idx = Array.from(whys).indexOf(el);
          if (idx >= 0 && idx < reasons.length) r = reasons[idx];
        }
        return r;
      }
      function footnoteLabel(html, fallbackText) {
        const wrap = document.createElement("div");
        wrap.innerHTML = String(html || "");
        const strong = wrap.querySelector("strong");
        if (strong) {
          const label = strong.textContent.replace(/[\s:.]+$/g, "").trim();
          if (label) return label;
        }
        const plain = wrap.textContent.replace(/\s+/g, " ").trim();
        if (/conjugate/i.test(plain)) return "Conjugate method";
        if (/pythagorean/i.test(plain)) return "Pythagorean theorem";
        if (/division property of equality/i.test(plain))
          return "Division property of equality";
        if (/product of powers rule/i.test(plain))
          return "Product of powers rule";
        if (/quotient of powers rule/i.test(plain))
          return "Quotient of powers rule";
        if (/power of a power rule/i.test(plain))
          return "Power of a power rule";
        if (/negative exponent rule/i.test(plain))
          return "Negative exponent rule";
        if (/difference of squares/i.test(plain))
          return "Difference of squares identity";
        const t = String(fallbackText || "note")
          .trim()
          .toLowerCase();
        if (t === "identity") return "Identity used";
        if (t === "rule") return "Rule used";
        if (t === "method") return "Method";
        return "Note";
      }

      function buildFootnoteRef(num, kind = "inline-ref") {

      function stripDuplicateFootnoteLead(html, label) {
        let out = String(html || "").trim();
        const esc = String(label || "")
          .trim()
          .replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        if (esc) {
          out = out.replace(
            new RegExp(
              "^\\s*(?:<p>)?\\s*<strong>\\s*" +
                esc +
                "\\s*[:.]?\\s*<\\/strong>\\s*",
              "i",
            ),
            "",
          );
          out = out.replace(/^\s*<\/p>\s*/i, "");
          out = out.replace(/^\s*[:\-–—]\s*/, "");
          out = out.replace(/^\s*<p>\s*<\/p>\s*/i, "");

      function refreshEqFootnotePositions(root = document) {
        root
          .querySelectorAll('.footnote-ref.eq-display-ref[data-eq-overlay="1"]')
          .forEach((ref) => {
            const host = ref.closest(".katex") || ref.parentElement;
            if (!host) return;
            const selector =
              ref.getAttribute("data-anchor-selector") || ".mrel, .mbin";
            const anchor = host.querySelector(selector);
            if (!anchor) return;
            const refW = ref.offsetWidth || 22;
            const refH = ref.offsetHeight || 22;
            let left = anchor.offsetLeft + anchor.offsetWidth + 6;
            let top = anchor.offsetTop - Math.round(refH * 0.45);
            if (top < 0) top = 0;
            ref.style.left = left + "px";
            ref.style.top = top + "px";

      let eqStepMarkerSerial = 0;
      function refreshEquationStepFootnotePositions(root = document) {
        root.querySelectorAll(".eq-step-footnotes").forEach((overlay) => {
          const display = overlay.parentElement;
          if (!display) return;
          const displayRect = display.getBoundingClientRect();
          overlay
            .querySelectorAll(".footnote-ref.eq-step-ref")
            .forEach((ref) => {
              const markerId = ref.getAttribute("data-source-marker-id");
              const marker = markerId
                ? document.getElementById(markerId)
                : null;
              if (!marker) return;
              const refH = ref.offsetHeight || 22;
              const markerRect = marker.getBoundingClientRect();
              const markerMidY =
                markerRect.top + (markerRect.height || refH) / 2;
              const searchRoot =
                marker.closest(".col-align-l") ||
                marker.closest(".mtable") ||
                display;
              const relationFilter = (el) => {
                const t = (el.textContent || "").replace(/\s+/g, "").trim();
                return t === "=" || t === "≠" || t === "≈";
              };
              const row = marker.closest(".mtr") || marker.closest("tr");
              const relations = Array.from(
                searchRoot.querySelectorAll(".mrel, .mbin"),
              ).filter(relationFilter);
              const markerFollows = (rel) => {
                if (rel === marker) return false;
                const cmp = rel.compareDocumentPosition(marker);
                return (
                  !!(cmp & Node.DOCUMENT_POSITION_FOLLOWING) ||
                  !!(cmp & Node.DOCUMENT_POSITION_CONTAINED_BY)
                );
              };
              let anchor = null;
              if (row && row.querySelectorAll) {
                const sameRowRelations = Array.from(
                  row.querySelectorAll(".mrel, .mbin"),
                ).filter(relationFilter);
                const sameRowPreceding = sameRowRelations.filter(markerFollows);
                if (sameRowPreceding.length) {
                  anchor = sameRowPreceding[sameRowPreceding.length - 1];
                }
              }
              if (!anchor && relations.length) {
                const precedingRelations = relations.filter(markerFollows);
                if (precedingRelations.length) {
                  anchor = precedingRelations[precedingRelations.length - 1];
                }
              }
              if (!anchor && relations.length) {
                let bestGap = Infinity;
                relations.forEach((rel) => {
                  const rect = rel.getBoundingClientRect();
                  const relMidY = rect.top + (rect.height || refH) / 2;
                  const gap = Math.abs(relMidY - markerMidY);
                  const sameOrAbovePenalty = rect.top > markerMidY ? 8 : 0;
                  const score = gap + sameOrAbovePenalty;
                  if (score < bestGap) {
                    bestGap = score;
                    anchor = rel;
                  }
                });
              }
              if (!anchor) {
                const fallbackRow = row || marker;
                anchor =
                  fallbackRow && fallbackRow.querySelector
                    ? fallbackRow.querySelector(".mrel") ||
                      fallbackRow.querySelector(".mbin") ||
                      fallbackRow
                    : marker;
              }
              const anchorRect = anchor.getBoundingClientRect();
              let top =
                anchorRect.top -
                displayRect.top +
                ((anchorRect.height || refH) - refH) / 2;
              top -= 1;
              if (!Number.isFinite(top)) top = 0;
              if (top < 0) top = 0;
              ref.style.top = top + "px";
            });
        });
      }
      function convertEquationInlineFootnotesToStepRefs(root = document) {
        root
          .querySelectorAll(".qb .sc, .review-mcq .mex, .answer-item")
          .forEach((container) => {
            container
              .querySelectorAll(
                ".eq-block .katex-display, .plain-block-math .katex-display, .mb .katex-display",
              )
              .forEach((display) => {
                const markers = Array.from(
                  display.querySelectorAll(".fn-inline"),
                ).filter((marker) => (marker.textContent || "").trim());
                const oldOverlay = display.querySelector(".eq-step-footnotes");
                if (oldOverlay) oldOverlay.remove();
                display.classList.remove("has-step-footnotes");
                if (!markers.length) return;
                const overlay = document.createElement("div");
                overlay.className = "eq-step-footnotes";
                display.style.position = "relative";
                let used = 0;
                markers.forEach((marker) => {
                  const num = (marker.textContent || "").trim();
                  if (!num) return;
                  if (!marker.id)
                    marker.id = "eq-step-marker-" + ++eqStepMarkerSerial;
                  marker.classList.add("fn-inline-hidden");
                  marker.setAttribute("aria-hidden", "true");
                  const ref = buildFootnoteRef(num, "eq-step-ref");
                  ref.setAttribute("data-source-marker-id", marker.id);
                  overlay.appendChild(ref);
                  used += 1;
                });
                if (!used) return;
                display.classList.add("has-step-footnotes");
                display.appendChild(overlay);

      function insertEqFootnoteNearFirstRelation(display, ref) {
        if (!display || !ref) return false;
        const anchor =
          display.querySelector(".mrel") || display.querySelector(".mbin");
        const host =
          display.querySelector(".katex") ||
          display.querySelector(".katex-html") ||
          display;
        if (!host || !anchor) {
          (host || display).appendChild(ref);
          return true;
        }
        host.style.position = "relative";
        ref.classList.add("eq-display-ref");
        ref.dataset.eqOverlay = "1";
        ref.setAttribute(
          "data-anchor-selector",
          anchor.classList.contains("mrel") ? ".mrel" : ".mbin",
        );
        ref.style.position = "absolute";
        ref.style.margin = "0";
        ref.style.visibility = "hidden";

          ref.style.visibility = "";

      function addSolutionFootnote(container, registry, html, label) {
        const key = normalizeReasonKey(html);
        if (registry.has(key)) return registry.get(key);
        const num = registry.size + 1;
        registry.set(key, num);
        const box = ensureSolutionFootnotes(container);
        box.appendChild(buildFootnoteItem(num, label, html));
        return num;

      function convertWhyToFootnotes(root = document) {
        root
          .querySelectorAll(".qb .sc, .review-mcq .mex, .answer-item")
          .forEach((container) => {
            const registry = new Map();

            container.querySelectorAll(".step-why").forEach((btn) => {
              const body = getWhyBody(btn);
              const html = body ? body.innerHTML : "";
              if (!html.trim()) {
                btn.remove();
                if (body) body.remove();
                return;
              }
              const num = addSolutionFootnote(
                container,
                registry,
                html,
                footnoteLabel(html, btn.textContent),
              );
              const ref = buildFootnoteRef(num, "inline-ref");
              btn.replaceWith(ref);
              if (body) body.remove();
            });

            container.querySelectorAll(".auto-why-block").forEach((block) => {
              const btn = block.querySelector(".eq-note-toggle");
              const body = block.querySelector(".eq-note-body");
              const html = body ? body.innerHTML : "";
              if (!html.trim()) {
                block.remove();
                return;
              }
              const num = addSolutionFootnote(
                container,
                registry,
                html,
                footnoteLabel(html, btn ? btn.textContent : "note"),
              );
              const prev = block.previousElementSibling;
              if (
                prev &&
                prev.classList &&
                prev.classList.contains("eq-block")
              ) {
                const hasInlineEquationRef =
                  !!prev.querySelector(".fn-inline") ||
                  /htmlClass\{fn-inline\}/.test(prev.innerHTML);
                if (hasInlineEquationRef) {
                  block.remove();
                } else {
                  const anchorText = prev.previousElementSibling;
                  if (anchorText && /^(P|LI)$/.test(anchorText.tagName)) {
                    const ref = buildFootnoteRef(num, "inline-ref");
                    anchorText.appendChild(document.createTextNode(" "));
                    anchorText.appendChild(ref);
                  } else {
                    const holder = document.createElement("div");
                    holder.className = "equation-footnote-holder";
                    holder.appendChild(buildFootnoteRef(num, "inline-ref"));
                    prev.after(holder);
                  }
                  block.remove();
                }
              } else if (prev && /^(P|LI)$/.test(prev.tagName)) {
                const ref = buildFootnoteRef(num, "inline-ref");
                prev.appendChild(document.createTextNode(" "));
                prev.appendChild(ref);
                block.remove();
              } else {
                const holder = document.createElement("div");
                holder.className = "equation-footnote-holder";
                holder.appendChild(buildFootnoteRef(num, "inline-ref"));
                block.replaceWith(holder);
              }
            });

            const box = container.querySelector(".solution-footnotes");
            if (box && !box.querySelector(".solution-footnote-item"))
              box.remove();
          });
      }

      function hideRedundantInlineRefs(root = document) {
        root
          .querySelectorAll(".qb .sc, .review-mcq .mex")
          .forEach((container) => {
            const eqMarkers = container.querySelectorAll(".fn-inline");
            if (!eqMarkers.length) return;
            const covered = new Set();
            eqMarkers.forEach((m) => {
              const n = m.textContent.trim();
              if (n) covered.add(n);
            });
            container
              .querySelectorAll(
                ".footnote-ref.inline-ref, .equation-footnote-holder",
              )
              .forEach((el) => {
                const btn = el.classList.contains("footnote-ref")
                  ? el
                  : el.querySelector(".footnote-ref");
                if (btn && covered.has(btn.textContent.trim())) el.remove();

              m.addEventListener("click", function () {
                const item = container.querySelector(

      function pruneFootnoteArtifacts(root = document) {
        root
          .querySelectorAll(".qb .sc, .review-mcq .mex, .answer-item")
          .forEach((container) => {
            const noteNums = new Set(
              Array.from(
                container.querySelectorAll(".solution-footnote-item"),
              ).map((item) => item.getAttribute("data-note-num")),
            );
            container.querySelectorAll(".footnote-ref").forEach((ref) => {
              const num = ref.getAttribute("data-footnote-ref");
              if (!noteNums.has(num)) ref.remove();
            });
            container.querySelectorAll(".fn-inline").forEach((ref) => {
              const num = (ref.textContent || "").trim();
              if (num && !noteNums.has(num)) ref.remove();
            });
            const usedNums = new Set();
            container
              .querySelectorAll(".footnote-ref")
              .forEach((ref) =>
                usedNums.add(ref.getAttribute("data-footnote-ref")),
              );
            container.querySelectorAll(".fn-inline").forEach((ref) => {
              const num = (ref.textContent || "").trim();
              if (num) usedNums.add(num);
            });
            container
              .querySelectorAll(".solution-footnote-item")
              .forEach((item) => {
                const num = item.getAttribute("data-note-num");
                if (!usedNums.has(num)) item.remove();
              });
            container
              .querySelectorAll(".equation-footnote-holder")
              .forEach((holder) => {
                if (!holder.querySelector(".footnote-ref")) holder.remove();
              });
            const box = container.querySelector(".solution-footnotes");
            if (box && !box.querySelector(".solution-footnote-item"))
              box.remove();
          });

      function tikzWrap(svg) {
        return `<div class="tikz-wrap">${svg}</div>`;
      }

      function printNode(nodeOrSelector, title) {
        const node =
          typeof nodeOrSelector === "string"
            ? document.querySelector(nodeOrSelector)
            : nodeOrSelector;
        if (!node) return;
        const clone = node.cloneNode(true);
        clone
          .querySelectorAll(
            ".qh-tools,.ph-tools,.test-tools,.tool-btn,.qg,.test-answer-key",
          )
          .forEach((el) => el.remove());
        clone
          .querySelectorAll(".qb,.concepts")
          .forEach((el) => el.classList.add("open"));
        const headBits = [...document.head.children]
          .filter((el) => ["STYLE", "LINK", "META"].includes(el.tagName))
          .map((el) => el.outerHTML)
          .join("");
        const win = window.open(
          "about:blank",
          "_blank",
          "width=980,height=1200",
        );
        if (!win) return;
        win.document
          .write(`<!DOCTYPE html><html><head>${headBits}<style>body{background:#fff;padding:20px} .jumpbar,.top,.intro-tools,.footer-note{display:none!important} .qb,.concepts,.test-block,.gout .ts,.gout .th{box-shadow:none!important} .qs{max-height:none!important}

/* mobile-first header and viewport indicator */
.topin{max-width:1040px;margin:0 auto;padding:12px 14px;display:grid;gap:10px}
.topbar{display:block}
.brand{font-size:1.12rem;line-height:1.15}
.view-indicator{display:none!important}
.vi-label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.vi-section{font-size:.95rem;font-weight:700;color:var(--accent);line-height:1.2}
.vi-question{font-size:.86rem;color:#4f4a43;line-height:1.25;word-break:break-word}
.view-indicator.no-question .vi-question{display:none}
.topnav{display:flex;flex-wrap:nowrap;gap:8px;overflow:auto;padding-bottom:2px;scrollbar-width:thin}
.topnav a{flex:none;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.76);border:1px solid var(--line);font-size:.9rem;color:#4f4a43;transition:all .18s ease}
.topnav a:hover,.topnav a.current{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
#matchCount{flex:none;display:none;align-items:center;justify-content:center;padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:.82rem;color:var(--muted);white-space:nowrap}
#matchCount:not(:empty){display:inline-flex}
.jumpbar a.current{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700}
@media (min-width:760px){
 .topin{padding:14px 20px}
 .topbar{display:block}
 .view-indicator{display:none!important}
}
@media (max-width:620px){
 .topin{padding:12px 12px;gap:8px}
 .brand{font-size:1.04rem}
 .topnav a{padding:7px 10px;font-size:.84rem}
 .view-indicator{padding:9px 10px}
 .vi-section{font-size:.9rem}
 .vi-question{font-size:.82rem}
}


.sc ol.alpha,.mex ol.alpha,.answer-item ol.alpha{
  margin:.5rem 0 .75rem 1.35rem;
  padding-left:1rem;
  list-style:lower-alpha;
}
.sc ol.alpha > li,.mex ol.alpha > li,.answer-item ol.alpha > li{
  margin:.35rem 0;
}
.sc ol.alpha p,.mex ol.alpha p,.answer-item ol.alpha p{
  margin:0 0 .45rem;
}


/* ──── Step Justification Dropdowns ──── */
.step-why,
.eq-note-toggle{
  appearance:none;
  display:inline-flex;align-items:center;gap:5px;
  margin-left:6px;padding:2px 9px;
  border:1px solid rgba(30,93,77,.18);border-radius:999px;
  background:rgba(30,93,77,.05);color:rgba(30,93,77,.9);
  font:600 .72rem var(--sans);letter-spacing:.02em;
  cursor:pointer;vertical-align:middle;
  transition:all .18s ease;white-space:nowrap;
  text-transform:lowercase;
}
.step-why::before,
.eq-note-toggle::before{
  content:"▸";

/* ──── Mobile note popup + responsive annotation layout ──── */
.note-pop{
  position:fixed;inset:0;z-index:140;display:none;
}
.note-pop.show{display:block}
.note-pop-backdrop{
  position:absolute;inset:0;background:rgba(18,16,13,.42);
  backdrop-filter:blur(2px);
}
.note-pop-card{
  position:absolute;left:50%;bottom:18px;transform:translateX(-50%);

  max-height:min(70vh, 560px);

  background:#fffdf9;border:1px solid var(--line);border-radius:18px;
  box-shadow:0 18px 48px rgba(31,28,24,.22);
  padding:16px 16px 14px;
}
.note-pop-head{
  display:flex;align-items:center;gap:10px;justify-content:space-between;
  margin-bottom:10px;
}
.note-pop-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 10px;border-radius:999px;
  border:1px solid rgba(30,93,77,.18);
  background:rgba(30,93,77,.06);color:rgba(30,93,77,.95);
  font:700 .74rem var(--sans);text-transform:lowercase;letter-spacing:.02em;
}
.note-pop-tag::before{content:"▸";font-size:.72em;opacity:.8}
.note-pop-close{
  appearance:none;border:1px solid var(--line);background:#fff;border-radius:999px;
  width:34px;height:34px;display:grid;place-items:center;cursor:pointer;
  color:#5f5a53;font:700 1rem/1 var(--sans);
}
.note-pop-close:hover{border-color:var(--accent);color:var(--accent)}
.note-pop-body{
  font-size:.96rem;color:#4b463f;line-height:1.8;
}
.note-pop-body p{margin:0 0 8px}
.note-pop-body .katex-display{overflow-x:auto;overflow-y:hidden}
.note-pop-body .step-reason,
.note-pop-body .eq-note-body{
  display:block!important;margin:0;padding:0;border:none;background:transparent;
  border-radius:0;font-size:inherit;color:inherit;line-height:inherit;
}

@media(max-width:760px){

 <p>Now, with ${I("O")} as center and ${I("OB")} as radius, draw an arc to cut the number line at ${I("C")}. The point ${I("C")} represents ${I("\\sqrt{2}")}.</p>

 <li>At ${I("C")}, draw a perpendicular and mark a point ${I("D")} one unit above ${I("C")} so that ${I("CD = 1")}.</li>
 <li>Join ${I("O")} to ${I("D")}. Then ${I("OD")} is the hypotenuse of a right triangle with legs ${I("\\sqrt{2}")} and ${I("1")}.</li>
 </ol>
 ${D("(OD)^2 = (OC)^2 + (CD)^2 = (\\sqrt{2})^2 + 1^2 = 2 + 1 = 3 \\Rightarrow OD = \\sqrt{3}")}

      function filterQuestions(q) {
        q = (q || "").trim().toLowerCase();
        const targets = [
          ...document.querySelectorAll(
            ".qb, .concepts, .test-block, .gout .ts, .gout .th",
          ),
        ];
        let visible = 0;
        targets.forEach((el) => {
          const text = el.textContent.toLowerCase();
          const hit = !q || text.includes(q);
          el.style.display = hit ? "" : "none";
          if (hit) visible++;
          if (
            hit &&
            q &&
            (el.classList.contains("qb") || el.classList.contains("concepts"))
          )
            el.classList.add("open");
          if (
            !q &&
            (el.classList.contains("qb") || el.classList.contains("concepts"))
          )
            el.classList.remove("open");
        });
        // hide section labels with no visible content after them
        document.querySelectorAll(".sl").forEach((label) => {
          let sib = label.nextElementSibling;
          let hasVisible = false;
          while (
            sib &&
            !sib.classList.contains("sl") &&
            !sib.classList.contains("ph")
          ) {
            if (sib.style.display !== "none") {
              hasVisible = true;
              break;
            }
            sib = sib.nextElementSibling;
          }
          label.style.display = !q || hasVisible ? "" : "none";
        });
        const count = document.getElementById("matchCount");
        if (count) count.textContent = q ? `${visible} matches` : "";
        const note = document.getElementById("searchNote");
        if (note) {
          note.innerHTML = q
            ? visible
              ? `<strong>${visible}</strong> matching blocks found for “${q}”. Matching question cards are opened automatically.`
              : `No matching blocks found for “${q}”.`
            : "Search works across questions, solutions, concepts, review material, and the unit test.";
        }
      }

      let viewportTrackerFrame = 0;
      function scheduleViewportTracker() {
        if (viewportTrackerFrame) return;
        viewportTrackerFrame = requestAnimationFrame(() => {
          viewportTrackerFrame = 0;
          updateViewportTracker();
        });
      }
      function updateViewportTracker() {
        const sections = [
          ...document.querySelectorAll(".chapter-flow > section"),
        ];
        if (!sections.length) return;
        const header = document.querySelector(".top");
        const probeY =
          (header ? header.getBoundingClientRect().height : 0) + 18;
        let activeSection = sections[0];
        for (const sec of sections) {
          const r = sec.getBoundingClientRect();
          if (r.top <= probeY && r.bottom > probeY) {
            activeSection = sec;
            break;
          }
          if (r.top <= probeY) activeSection = sec;
        }
        const items = [
          ...activeSection.querySelectorAll("[data-track-question]"),
        ].filter((el) => el.offsetParent !== null);
        let activeQuestion = null;
        for (const item of items) {
          const r = item.getBoundingClientRect();
          if (r.top <= probeY + 34 && r.bottom > probeY + 8) {
            activeQuestion = item;
            break;
          }
          if (r.top <= probeY + 34) activeQuestion = item;
        }
        if (!activeQuestion) {
          activeQuestion =
            items.find((item) => item.getBoundingClientRect().top > probeY) ||
            items[0] ||
            null;
        }
        const sectionLabel =
          activeSection.dataset.trackLabel ||
          activeSection.querySelector("h2,h3")?.textContent?.trim() ||
          "Unit 1";
        const questionLabel = activeQuestion
          ? activeQuestion.dataset.trackQuestion || ""
          : "Overview";
        setViewportContext(sectionLabel, questionLabel);
        updateActiveNav(activeSection.id);
      }
      function installViewportTracker() {
        window.addEventListener("scroll", scheduleViewportTracker, {
          passive: true,
        });
        window.addEventListener("resize", scheduleViewportTracker);
        scheduleViewportTracker();
      }
