<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 9 Mathematics | Unit 1 - Real Numbers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
:root{
 --paper:#f7f4ef; --sheet:#fffdf9; --line:#ded7cc; --muted:#6a655e; --ink:#1f1c18;
 --accent:#1e5d4d; --accent-soft:#e8f2ee; --gold:#9a6c2f; --gold-soft:#f6efe3; --link:#275ea8;
 --radius:16px; --shadow:0 8px 30px rgba(31,28,24,.05);
 --serif:Georgia, 'Times New Roman', serif; --sans:system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
 --circle-question:38px; --circle-option:38px; --circle-toggle:36px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.top{position:sticky;top:0;z-index:50;background:rgba(247,244,239,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topin{max-width:1040px;margin:0 auto;padding:14px 20px;display:flex;gap:14px;align-items:center;justify-content:space-between}
.brand{font-family:var(--serif);font-size:1.2rem;font-weight:700;letter-spacing:-.02em;color:var(--accent)}
.topnav{display:flex;flex-wrap:wrap;gap:10px 16px;font-size:.9rem;color:var(--muted)}
.topnav a:hover{color:var(--accent)}
.page{max-width:1040px;margin:0 auto;padding:28px 20px 56px}
.chapter-intro{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;align-items:start;margin-bottom:18px}
.chapter-intro>div{background:var(--sheet);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:22px}
.kicker{font-size:.76rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:700;margin-bottom:6px}
.chapter-intro h1{font-family:var(--serif);font-size:2.2rem;line-height:1.05;letter-spacing:-.03em;margin:0 0 10px}
.chapter-intro p{margin:0;color:#4c4740;max-width:62ch}
.intro-tools input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);font:inherit;outline:none}
.intro-tools input:focus{border-color:var(--accent)}
.tool-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.tool-btn{appearance:none;border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:999px;font:600 .92rem var(--sans);color:var(--ink);cursor:pointer}
.tool-btn:hover{border-color:var(--accent);color:var(--accent)}
.tool-btn.iconprint,.rbtn.iconprint,.abtn.iconprint{
 width:38px;height:38px;padding:0;border-radius:999px;display:inline-grid;place-items:center
}
.tool-btn.iconprint svg,.rbtn.iconprint svg,.abtn.iconprint svg{width:16px;height:16px;display:block}
.jumpbar{position:sticky;top:64px;z-index:40;display:flex;flex-wrap:wrap;gap:10px;background:rgba(247,244,239,.96);border:1px solid var(--line);border-radius:16px;padding:10px 12px;margin-bottom:24px;box-shadow:var(--shadow)}
.jumpbar a{padding:7px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:.9rem;color:#4f4a43}
.jumpbar a:hover{border-color:var(--accent);color:var(--accent)}
.chapter-flow section{margin-bottom:26px}
.ph{padding:18px 0 12px;border-bottom:2px solid #c9c1b5;margin-bottom:18px}
.lb{font-size:.76rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:700;margin-bottom:5px}
.ph h2{font-family:var(--serif);font-size:1.9rem;line-height:1.1;margin:0}
.ds{margin-top:7px;color:var(--muted);font-size:.93rem}
.reading-note{background:var(--gold-soft);border:1px solid #ead9bc;color:#705127;padding:12px 14px;border-radius:14px;margin:14px 0 18px;font-size:.92rem}
.concepts{background:var(--sheet);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px}
.concepts-hdr{display:flex;align-items:center;gap:10px;padding:14px 18px;background:#fbf8f2;cursor:pointer;user-select:none}
.concepts-hdr .title{font-family:var(--serif);font-size:1.02rem;font-weight:700;color:var(--accent);flex:1}
.concepts-hdr .arrow{transition:transform .22s ease;color:var(--accent)}
.concepts.open .concepts-hdr .arrow{transform:rotate(180deg)}
.concepts-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.concepts.open .concepts-body{max-height:12000px}
.concepts-inner{padding:18px 20px 20px;font-size:1rem;color:#3f3a34}
.concepts-inner h4{font-family:var(--serif);font-size:1.06rem;margin:14px 0 4px;color:var(--ink)}
.concepts-inner h4:first-child{margin-top:0}
.concepts-inner p{margin:0 0 8px}
.sl{font-family:var(--serif);font-size:1.25rem;font-weight:700;margin:26px 0 12px;color:var(--ink)}
.qb{background:var(--sheet);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px}
.qh{display:flex;gap:12px;align-items:center;padding:16px 18px;cursor:pointer}
.qn{width:var(--circle-question);height:var(--circle-question);min-width:var(--circle-question);min-height:var(--circle-question);aspect-ratio:1 / 1;border-radius:50%;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);font:800 .9rem/1 var(--sans);font-variant-numeric:tabular-nums;flex:0 0 var(--circle-question);margin-top:0}
.qn[data-len="2"],.paper-qnum[data-len="2"]{font-size:.82rem}
.qn[data-len="3"],.paper-qnum[data-len="3"]{font-size:.74rem;letter-spacing:-.01em}
.qn[data-len="4"],.paper-qnum[data-len="4"]{font-size:.68rem;letter-spacing:-.02em}
.qn[data-len="5"],.paper-qnum[data-len="5"]{font-size:.62rem;letter-spacing:-.02em}
.qt{flex:1;font-size:1rem;color:#2e2a26;display:block;line-height:1.6;min-height:32px;padding-top:2px;padding-bottom:2px}
.qt .katex{vertical-align:middle;margin-left:.08em;margin-right:.08em}
.qt .katex-display{display:inline-flex!important;justify-content:center;vertical-align:middle;margin:.1em .12em!important}
.qt .katex-display>.katex{max-width:100%;text-align:center}
.test-list .katex,.test-head .katex,.gout .katex{vertical-align:middle;margin-left:.06em;margin-right:.06em}
.qg{width:var(--circle-toggle);height:var(--circle-toggle);min-width:var(--circle-toggle);min-height:var(--circle-toggle);aspect-ratio:1 / 1;border-radius:50%;display:grid;place-items:center;background:#f1ece4;color:#7b746a;flex:0 0 var(--circle-toggle);transition:all .2s}
.qg svg{width:15px;height:15px;transition:transform .2s}
.qb.open .qg{background:var(--accent-soft);color:var(--accent)}
.qb.open .qg svg{transform:rotate(180deg)}
.qs{max-height:0;overflow:hidden;transition:max-height .35s ease}
.qb.open .qs{max-height:16000px}
.si{padding:0 18px 18px 62px}
.slb{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:8px}
.sc{font-size:1rem;color:#3f3a34;line-height:1.85}
.sc p{margin:0 0 8px}
.sc .note{background:#f8f5ef;border-left:3px solid var(--accent);padding:11px 13px;border-radius:12px;margin:10px 0;font-size:.94rem}
.mb{display:block;text-align:center;margin:10px 0;overflow-x:auto;padding:2px 0}
.eq-block{display:block;margin:10px 0;overflow-x:auto;padding:2px 0}
.eq-block .katex-display{margin:.35em 0;display:flex;justify-content:center;overflow-x:auto}
.eq-block .katex-display>.katex{max-width:100%;text-align:center}
.plain-block-math{display:block;margin:10px 0;overflow-x:auto;padding:2px 0;text-align:center}
.plain-block-math .katex-display{margin:.35em 0;display:flex;justify-content:center;overflow-x:auto}
.plain-block-math .katex-display>.katex{max-width:100%;text-align:center}
.katex{font-size:1em!important}
.mb .katex-display{margin:.35em 0}
.mo{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.mop{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;transition:all .18s ease;font-size:.95rem}
.mop:hover{border-color:var(--accent);background:#fbfefc}
.ml{width:var(--circle-option);height:var(--circle-option);min-width:var(--circle-option);min-height:var(--circle-option);aspect-ratio:1 / 1;border-radius:50%;display:grid;place-items:center;background:#f2ede6;font:800 .76rem/1 var(--sans);font-variant-numeric:tabular-nums;color:#625c54;flex:0 0 var(--circle-option)}
.mop.ok{border-color:var(--accent);background:var(--accent-soft)}
.mop.ok .ml{background:var(--accent);color:#fff}
.mop.no{border-color:#be4b49;background:#fbefee}
.mop.no .ml{background:#be4b49;color:#fff}
.mex{display:none;margin-top:10px;background:#f7f3eb;border-left:3px solid var(--gold);padding:10px 12px;border-radius:12px;color:#5d4f37;font-size:.93rem}
.mex.show{display:block}
.test-block{background:var(--sheet);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:12px}
.test-head{display:flex;flex-wrap:wrap;gap:10px 12px;align-items:baseline;margin-bottom:10px}
.test-head strong{font-size:1rem;color:var(--accent)}
.test-head span{font-family:var(--serif);font-size:1.05rem;font-weight:700}
.test-head em{font-size:.9rem;color:var(--muted);font-style:normal}
.test-list{margin:0;padding-left:22px;color:#36312c}
.test-list li{margin:7px 0}
.test-list.alpha{list-style-type:lower-alpha}
.footer-note{margin-top:28px;text-align:center;color:var(--muted);font-size:.92rem}
@media (max-width:860px){
 .chapter-intro{grid-template-columns:1fr}
 .jumpbar{top:60px}
 .mo{grid-template-columns:1fr}
}
@media (max-width:620px){
 .topin{padding:12px 14px;align-items:flex-start;flex-direction:column}
 .page{padding:18px 14px 44px}
 .chapter-intro h1{font-size:1.7rem}
 .ph h2{font-size:1.5rem}
 .qh{padding:14px 14px}
 .si{padding:0 14px 16px 14px}
 .jumpbar{position:static}
}
@media print{
 .top,.jumpbar,.intro-tools{display:none!important}
 body{background:#fff}
 .page{max-width:none;padding:0}
 .qb,.concepts,.test-block,.chapter-intro>div{box-shadow:none;border-color:#bbb}
 .qs{max-height:none!important}
 .qb,.concepts{page-break-inside:avoid}
}

/* enhancement layer */
.topnav a.current{color:var(--accent);font-weight:700}
.printmini,.headbtn{
 appearance:none;border:1px solid var(--line);background:#fff;color:var(--muted);
 border-radius:999px;padding:7px 11px;font:600 .82rem var(--sans);cursor:pointer
}
.printmini:hover,.headbtn:hover{border-color:var(--accent);color:var(--accent)}
.qh-tools{display:flex;gap:8px;align-items:center;margin-left:auto;padding-left:8px}
.qh-tools .printmini{padding:6px 10px}
.iconprint{
 width:36px;height:36px;padding:0!important;border-radius:999px!important;
 display:inline-grid!important;place-items:center;line-height:1
}
.iconprint svg{width:16px;height:16px;display:block}
.math-fallback{
 display:inline-block;padding:0 .35em;border-radius:6px;background:#fff7e6;
 color:#6f541c;font:500 .92em var(--mono)
}
.ph-tools,.test-tools{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.search-note{margin-top:10px;font-size:.9rem;color:var(--muted)}
.search-note strong{color:var(--accent)}
.detail-standard{margin:18px 0 6px;background:linear-gradient(180deg,#fffdf9,#fff);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
.detail-standard h3{margin:0 0 8px;font-family:var(--serif);font-size:1.08rem}
.detail-standard p{margin:0 0 12px;color:#4a453e;font-size:.94rem;line-height:1.78}
.detail-points{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.detail-points div{padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:.86rem;color:#4a453e;line-height:1.7}
.detail-points strong{color:var(--ink)}
.tikz-wrap{
 margin:14px 0 10px;padding:12px;border:1px solid var(--line);border-radius:14px;
 background:#fff;overflow-x:auto
}
.tikz-wrap svg{display:block;max-width:100%;height:auto;margin:0 auto}
.search-muted{opacity:.45}
.gi{background:var(--sheet);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.gi h3{margin:0 0 6px;font-family:var(--serif);font-size:1.35rem}
.gi p{margin:0;color:#4c4740}
.gf{background:var(--sheet);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.gr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.gfl label{display:block;font-size:.76rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.gfl select,.gfl input[type=number]{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);font:inherit;outline:none}
.gfl select:focus,.gfl input[type=number]:focus{border-color:var(--accent)}
.gps{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}
.pb{appearance:none;border:1px solid var(--line);background:#fff;padding:8px 14px;border-radius:999px;font:600 .88rem var(--sans);cursor:pointer;color:#4b463f}
.pb:hover,.pb.act{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.gb,.rbtn,.abtn{
 appearance:none;border:none;background:var(--accent);color:#fff;border-radius:12px;
 padding:12px 16px;font:700 .92rem var(--sans);cursor:pointer
}
.gb:hover,.rbtn:hover,.abtn:hover{background:#17483c}
.abtn{background:var(--gold);color:#fff}
.abtn:hover{background:#815927}
.gout{margin-top:22px}
.gout .th{text-align:center;padding:18px;border:1px solid var(--line);border-radius:18px;background:var(--sheet);box-shadow:var(--shadow);margin-bottom:16px}
.gout .th h3{margin:0;font-family:var(--serif);font-size:1.4rem}
.gout .th .tm{margin-top:5px;color:var(--muted);font-size:.9rem}
.answer-item{margin:.55rem 0;padding:.55rem .7rem;border:1px solid var(--line);border-radius:12px;background:#fff}
.answer-item p{margin:.2rem 0}
.test-answer-key summary{cursor:pointer;font-weight:700;color:var(--accent)}
.gout .ts{background:var(--sheet);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:14px}
.gout .ts h4{margin:0 0 12px;font-family:var(--serif);font-size:1.05rem;color:var(--accent)}
.gout .tq{padding:10px 0;border-bottom:1px dashed var(--line);font-size:.97rem}
.gout .tq:last-child{border-bottom:none}
.gout .tn{font-weight:800;color:var(--accent);margin-right:6px}
.gout .tmo{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;padding:8px 0 0 26px;color:#4a453e;font-size:.92rem}
.ak{display:none;margin-top:14px;background:#f7f1e8;border:1px solid #ead9bc;border-left:3px solid var(--gold);border-radius:14px;padding:14px;color:#5e4a25}
.ak.show{display:block}
@media (max-width:760px){
 .gr{grid-template-columns:1fr}
 .gout .tmo{grid-template-columns:1fr}
 .qh{flex-wrap:wrap}
 .qh-tools{width:100%;justify-content:flex-end;margin-left:0}
 .detail-points{grid-template-columns:1fr}
}



/* paper-style upgrade for unit test and generated papers */
.paper-frame{background:var(--sheet);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:22px 22px 24px}
.paper-meta{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:16px 0 18px}
.paper-meta-card{border:1px solid var(--line);border-radius:14px;background:#fbf8f2;padding:10px 12px}
.paper-meta-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px}
.paper-meta-value{font-family:var(--serif);font-size:1rem;color:var(--ink)}
.paper-note{background:#f8f5ef;border-left:3px solid var(--accent);padding:12px 14px;border-radius:14px;color:#4c4740;font-size:.94rem;line-height:1.78;margin:0 0 16px}
.paper-section{border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow);margin:0 0 18px;overflow:hidden}
.paper-section-head{display:flex;align-items:center;gap:14px;padding:16px 18px;background:#fbf8f2;border-bottom:1px solid var(--line)}
.paper-section-code{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:var(--accent);color:#fff;font:800 .98rem var(--sans);flex:none;box-shadow:0 4px 14px rgba(30,93,77,.16)}
.paper-section-head h3{margin:0;font-family:var(--serif);font-size:1.18rem;line-height:1.1;color:var(--ink)}
.paper-section-head p{margin:5px 0 0;color:var(--muted);font-size:.93rem}
.paper-section-body{padding:16px 18px 18px}
.paper-question{padding:16px 0;border-bottom:1px dashed var(--line)}
.paper-question:last-child{border-bottom:none}
.paper-question-main{display:grid;grid-template-columns:var(--circle-question) 1fr;gap:14px;align-items:start}
.paper-question.mcq .paper-question-main{align-items:center}
.paper-qnum{width:var(--circle-question);height:var(--circle-question);min-width:var(--circle-question);min-height:var(--circle-question);aspect-ratio:1 / 1;border-radius:50%;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);font:800 .9rem/1 var(--sans);font-variant-numeric:tabular-nums;margin:0;flex:0 0 var(--circle-question)}
.paper-question.plain .paper-qnum{align-self:start;margin-top:2px}
.paper-question.mcq .paper-qnum{align-self:center}
.paper-question-text{min-width:0;font-size:1rem;line-height:1.82;color:#322d28;font-weight:400}
.paper-question-text p{margin:0 0 8px}
.paper-question-text p:last-child{margin-bottom:0}
.paper-question-body{margin:12px 0 0 calc(var(--circle-question) + 14px)}
.paper-question.mcq .paper-question-body{margin-top:12px}
.paper-subq-title{font-family:var(--serif);font-size:1.05rem;font-weight:700;color:var(--ink)}
.paper-question.mcq .paper-question-text,.paper-question.mcq .paper-question-text .paper-subq-title{font-family:var(--sans);font-size:1rem;font-weight:400;line-height:1.72;color:#322d28}
.review-mcq-head{display:grid;grid-template-columns:var(--circle-question) 1fr;gap:14px;align-items:center;padding:16px 18px 0}
.review-mcq-body{padding:12px 18px 18px calc(18px + var(--circle-question) + 14px);}
.review-mcq .qt{font-weight:400;line-height:1.72;color:#322d28}
.review-group-title{font-family:var(--serif);font-size:1.08rem;font-weight:700;color:var(--ink);margin:18px 0 8px;padding-left:2px}
.paper-subq-note{margin-top:4px;color:var(--muted);font-size:.93rem}
.paper-options{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;margin-top:12px}
.paper-option{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;background:#fffdf9;padding:11px 13px;min-height:64px}
.paper-letter{width:var(--circle-option);height:var(--circle-option);min-width:var(--circle-option);min-height:var(--circle-option);aspect-ratio:1 / 1;border-radius:50%;display:grid;place-items:center;background:#f2ede6;color:#625c54;font:800 .76rem/1 var(--sans);font-variant-numeric:tabular-nums;flex:0 0 var(--circle-option);text-transform:lowercase}
.paper-option-text{min-width:0;color:#403a34;line-height:1.7}
.paper-parts{margin:12px 0 0;padding-left:28px;color:#3d3832}
.paper-parts li{margin:9px 0;line-height:1.82}
.paper-parts.alpha{list-style-type:lower-alpha}
.paper-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.paper-answer-key{margin-top:16px;border:1px solid #ead9bc;border-radius:16px;background:#f7f1e8;overflow:hidden}
.paper-answer-key summary{cursor:pointer;list-style:none;padding:14px 16px;font:700 .96rem var(--sans);color:#5e4a25}
.paper-answer-key summary::-webkit-details-marker{display:none}
.paper-answer-key[open] summary{border-bottom:1px solid #ead9bc}
.paper-answer-body{padding:14px 16px}
.paper-key-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px 12px}
.paper-key-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #ead9bc;border-radius:12px;background:#fffaf1;color:#5e4a25}
.paper-key-item .paper-letter{background:var(--gold);color:#fff}

// ═══ KATEX HELPERS ═══
function escHtml(s){return String(s).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]))}
function normalizeLatex(s){
 return String(s)
 .replace(/\\tfrac/g,'\\frac')
 .replace(/\^\\circ\s*F/g,'{}^\\circ\\!F')
 .replace(/\^\\circ\s*C/g,'{}^\\circ\\!C')
 .replace(/\^\\circ\s*K/g,'{}^\\circ\\!K')
 .replace(/(^|[^\\A-Za-z])Rightarrow(?=[^A-Za-z]|$)/g,'$1\\Rightarrow')
 .replace(/(^|[^\\A-Za-z])sqrt\\{([^}]+)\\}/g,'$1\\sqrt{$2}')
 .replace(/(^|[^\\A-Za-z])sqrt\s*([0-9A-Za-z])/g,'$1\\sqrt{$2}')
 .replace(/(^|[^\\A-Za-z])leq(?=[^A-Za-z]|$)/g,'$1\\leq')
 .replace(/(^|[^\\A-Za-z])geq(?=[^A-Za-z]|$)/g,'$1\\geq')
 .replace(/(^|[^\\A-Za-z])times(?=[^A-Za-z]|$)/g,'$1\\times')
 .replace(/(^|[^\\A-Za-z])cdot(?=[^A-Za-z]|$)/g,'$1\\cdot')
 .replace(/\^\{(-?\d+)\/(\d+)\}/g,(_,a,b)=>a.startsWith('-')?`^{-\\frac{${a.slice(1)}}{${b}}}`:`^{\\frac{${a}}{${b}}}`)
 .replace(/\^(-?\d+)\/(\d+)/g,(_,a,b)=>a.startsWith('-')?`^{-\\frac{${a.slice(1)}}{${b}}}`:`^{\\frac{${a}}{${b}}}`)
 .replace(/(?<![A-Za-z0-9\\])([0-9]+)\s*\/\s*([0-9]+)(?![A-Za-z0-9])/g,'\\frac{$1}{$2}');
}
function smartAligned(src){
 let s = normalizeLatex(src).trim();
 if(/\\begin\{/.test(s)) return s;
 if(/\\Rightarrow|\\implies/.test(s)) return s.replace(/\\Rightarrow/g,'\\quad\\Rightarrow\\quad').replace(/\\implies/g,'\\quad\\implies\\quad');
 const parts=s.split('=').map(x=>x.trim()).filter(Boolean);
 const eqCount=(s.match(/=/g)||[]).length;
 if(eqCount>=2 || (eqCount>=1 && s.length>72)){
  const lines=[];
  lines.push(parts[0] + ' &= ' + parts[1]);
  for(let i=2;i<parts.length;i++) lines.push('&= ' + parts[i]);
  return '\\begin{aligned}' + lines.join(' \\\\ ') + '\\end{aligned}';
 }
 return s;
}
function renderMathString(latex, displayMode){
 const prepared = displayMode ? smartAligned(latex) : normalizeLatex(latex);
 if(window.katex){
  try{return katex.renderToString(prepared,{displayMode:!!displayMode,throwOnError:true,strict:'ignore',trust:true,maxSize:1000})}
  catch(e1){
   try{return katex.renderToString(normalizeLatex(latex),{displayMode:!!displayMode,throwOnError:false,strict:'ignore',trust:true,maxSize:1000})}
   catch(e2){return '<span class="math-fallback">'+escHtml(normalizeLatex(latex))+'</span>'}
  }
 }
 return '<span class="math-fallback">'+escHtml(normalizeLatex(latex))+'</span>';
}
function K(s,d){ return `<span class="math-slot" data-display="${d?1:0}" data-latex="${escHtml(String(s))}"></span>`; }
function KRaw(s,d){ return window.katex ? katex.renderToString(normalizeLatex(String(s)),{displayMode:!!d,throwOnError:false,strict:'ignore',trust:true,maxSize:1000}) : `<span class="math-fallback">${escHtml(normalizeLatex(String(s)))}</span>`; }
function I(s){return K(s,false)}
function D(s){ return '<div class="eq-block">'+K(s,true)+'</div>'; }
function parseQuestionNo(label){ const m=String(label||'').match(/Question\s+(\d+)/i); return m?m[1]:''; }
function normalizeBadgeText(val){ return String(val==null?'':val).trim(); }
function badgeMarkup(val, cls='qn'){ const raw = normalizeBadgeText(val); const len = Math.min(raw.length || 1, 5); return `<div class="${cls}" data-len="${len}">${escHtml(raw)}</div>`; }
function exerciseBadgeText(section, item){
 const raw = normalizeBadgeText(item&&item.n);
 const secNo = parseQuestionNo(section&&section.label);
 const split = raw.match(/^(\d+)([ivxlcdm]+)$/i);
 if(secNo && raw === secNo && section && Array.isArray(section.items) && section.items.length === 1) return 'i';
 if(secNo && split && split[1] === secNo) return split[2].toLowerCase();
 return raw.toLowerCase();
}
function reviewBadgeInfo(rawVal){
 const raw = normalizeBadgeText(rawVal);
 const split = raw.match(/^(\d+)([ivxlcdm]+)$/i);
 if(split) return {group: split[1], badge: split[2].toLowerCase()};
 return {group: '', badge: raw.toLowerCase()};
}
function exerciseTrackLabel(num, section, item){
 const secNo = parseQuestionNo(section&&section.label) || normalizeBadgeText(item&&item.n);
 const badge = exerciseBadgeText(section,item);
 return (!badge || badge===String(secNo).toLowerCase()) ? `Question ${secNo}` : `Question ${secNo} (${badge})`;
}
function reviewTrackLabel(rawVal){
 const info = reviewBadgeInfo(rawVal);
 return info.group ? `Question ${info.group} (${info.badge})` : `Question ${info.badge}`;
}
function stripLeadingEquals(s){ return normalizeLatex(String(s||'')).trim().replace(/^=\s*/,'').trim(); }
function buildAlignedFromBlocks(lines){
 lines = (lines||[]).map(x=>normalizeLatex(String(x||'')).trim()).filter(Boolean);
 if(!lines.length) return '';
 if(lines.length===1) return lines[0];
 const out=[];
 const first = lines[0];
 if(first.includes('=')){
  const idx = first.indexOf('=');
  const lhs = first.slice(0,idx).trim();
  const rhs = first.slice(idx+1).trim();
  out.push(`${lhs} &= ${rhs}`);
  for(let i=1;i<lines.length;i++) out.push(`&= ${stripLeadingEquals(lines[i])}`);
 } else {
  out.push(`${first} &= ${stripLeadingEquals(lines[1])}`);
  for(let i=2;i<lines.length;i++) out.push(`&= ${stripLeadingEquals(lines[i])}`);
 }
 return '\\begin{aligned}' + out.join(' \\\\\ ') + '\\end{aligned}';
}
function combineEquationBlocks(root=document){
 root.querySelectorAll('.sc, .answer-item, .mex').forEach(container=>{
  const kids=[...container.childNodes];
  let i=0;
  while(i<kids.length){
   const node=kids[i];
   if(!(node.nodeType===1 && node.classList.contains('eq-block'))){ i++; continue; }
   const group=[];
   let j=i;
   while(j<kids.length && kids[j].nodeType===1 && kids[j].classList.contains('eq-block')){
    group.push(kids[j]);
    j++;
   }
   if(group.length>=2){
    const lines = group.map(block=>{
     const slot = block.querySelector('.math-slot');
     return slot ? (slot.getAttribute('data-latex')||'') : block.textContent;
    });
    const merged=document.createElement('div');
    merged.className='eq-block';
    merged.innerHTML=K(buildAlignedFromBlocks(lines), true);
    group[0].before(merged);
    group.forEach(g=>g.remove());
    kids.splice(i, group.length, merged);
   }
   i++;
  }
 });
}
function inferIntroText(q){
 const t=(q||'').toLowerCase();
 if(t.includes('rationalize')) return 'We remove the surd from the denominator by multiplying the numerator and denominator by the same suitable factor. This keeps the value unchanged and makes the denominator rational.';
 if(t.includes('fraction') && (t.includes('express') || t.includes('recurring') || t.includes('decimal'))) return 'Let the repeating decimal be a variable. Then multiply by a suitable power of 10 so that the repeating block lines up exactly under itself. After subtraction, the repeating part disappears and we can solve for the variable.';
 if(t.includes('verify')) return 'We now check both sides carefully and show the main algebraic steps before comparing the results.';
 if(t.includes('simplify')) return 'We simplify the expression step by step, using the relevant law at each stage.';
 if(t.includes('find') || t.includes('evaluate')) return 'We use the given information, write the required relation clearly, and simplify one step at a time.';
 if(t.includes('state') || t.includes('define')) return 'We write the required statement clearly and in standard mathematical language.';
 return 'We proceed step by step so that each transformation is clear.';
}
function inferOutroText(q){
 const t=(q||'').toLowerCase();
 if(t.includes('rationalize')) return 'So the final line gives the required rationalized form.';
 if(t.includes('fraction') && (t.includes('express') || t.includes('recurring') || t.includes('decimal'))) return 'So the required fraction is the value obtained in the last line.';
 if(t.includes('verify')) return 'Since both sides are equal, the required property is verified.';
 if(t.includes('simplify')) return 'So the simplified form is the final expression above.';
 if(t.includes('find') || t.includes('evaluate')) return 'So the required value is shown in the last line.';
 return 'This gives the required result.';
}
function enrichSolutionNarration(root=document){
 root.querySelectorAll('.qb .sc, .answer-item').forEach(sc=>{
  const qText = sc.closest('.qb')?.querySelector('.qt')?.textContent || '';
  const firstElement = [...sc.childNodes].find(n=>n.nodeType===1);
  if(firstElement && firstElement.classList && firstElement.classList.contains('eq-block')){
   const p=document.createElement('p');
   p.textContent=inferIntroText(qText);
   sc.prepend(p);
  }
  const lastElement=[...sc.childNodes].filter(n=>n.nodeType===1).slice(-1)[0];
  if(lastElement && lastElement.classList && lastElement.classList.contains('eq-block')){
   const p=document.createElement('p');
   p.textContent=inferOutroText(qText);
   sc.appendChild(p);
  }
 });
}
function renderMath(root=document){
 root.querySelectorAll('.math-slot').forEach(el=>{
  const latex = el.getAttribute('data-latex') || '';

}
function fixInlineMathSpacing(root=document){
 const containers = root.querySelectorAll('.qt, .test-list li, .sc p, .concepts-inner p, .gout .tq, .reading-note, .search-note');
 containers.forEach(container=>{
  container.querySelectorAll('.katex').forEach(el=>{
   if(el.closest('.katex-display')) return;
   const prev = el.previousSibling;
   const next = el.nextSibling;
   if(prev && prev.nodeType===3 && /[^\s([{“"']$/.test(prev.textContent)) prev.textContent += ' ';
   if(next && next.nodeType===3 && /^[^\s,.;:!?)}\]”"']/.test(next.textContent)) next.textContent = ' ' + next.textContent;
  });
  container.querySelectorAll('.math-fallback').forEach(el=>{
   const prev = el.previousSibling;
   const next = el.nextSibling;
   if(prev && prev.nodeType===3 && /[^\s([{“"']$/.test(prev.textContent)) prev.textContent += ' ';
   if(next && next.nodeType===3 && /^[^\s,.;:!?)}\]”"']/.test(next.textContent)) next.textContent = ' ' + next.textContent;
  });
 });
}

const EX11_CONCEPTS=`
<h4>Rational Numbers</h4>
<p>A rational number is any number expressible as ${I('\\frac{p}{q}')} where ${I('p,q \\in \\mathbb{Z}')} and ${I('q \\neq 0')}. The set is denoted ${I('\\mathbb{Q}')}. Rational numbers have terminating or nonterminating recurring decimal expansions.</p>
<h4>Irrational Numbers</h4>
<p>An irrational number cannot be expressed as ${I('\\frac{p}{q}')}. They have nonterminating, nonrecurring decimal expansions. Examples: ${I('\\sqrt{2}')}, ${I('\\pi')}, ${I('e')}.</p>
<h4>Real Numbers</h4>
<p>${I('\\mathbb{R} = \\mathbb{Q} \\cup \\mathbb{Q}\\prime')} - the union of all rational and irrational numbers.</p>
<h4>Properties</h4>
<p><strong>Additive:</strong> Closure, Commutative (${I('a+b=b+a')}), Associative (${I('(a+b)+c=a+(b+c)')}), Identity (${I('a+0=a')}), Inverse (${I('a+(-a)=0')}).</p>
<p><strong>Multiplicative:</strong> Closure, Commutative (${I('ab=ba')}), Associative (${I('(ab)c=a(bc)')}), Identity (${I('a \\cdot 1=a')}), Inverse (${I('a \\cdot \\frac{1}{a}=1')}).</p>
<p><strong>Distributive:</strong> ${I('a(b+c)=ab+ac')} and ${I('(a+b)c=ac+bc')}.</p>
<p><strong>Order Properties:</strong> Trichotomy, Transitive, Additive, Multiplicative, Division, Reciprocal.</p>`;

const EX11=[
{label:'Question 1 - Identify Rational or Irrational',items:[
{n:'i',q:`Identify: ${I('2.353535')}`,s:`<p>${I('2.353535')} has a finite number of digits after the decimal point (6 digits). It is a <strong>terminating decimal</strong>, therefore it is a <strong>rational number</strong>.</p>`},
{n:'ii',q:`Identify: ${I('0.\\overline{6}')}`,s:`<p>The bar over 6 indicates the digit 6 repeats infinitely: ${I('0.\\overline{6} = 0.666\\ldots')}. It is a <strong>nonterminating recurring decimal</strong>, so it is a <strong>rational number</strong>.</p>`},
{n:'iii',q:`Identify: ${I('2.236067\\ldots')}`,s:`<p>The digits do not repeat in a pattern and the three dots indicate they continue indefinitely. It is a <strong>nonterminating nonrecurring decimal</strong>, so it is an <strong>irrational number</strong>.</p>`},
{n:'iv',q:`Identify: ${I('\\sqrt{7}')}`,s:`<p>Since 7 is not a perfect square, ${I('\\sqrt{7}')} is an <strong>irrational number</strong>. The square root of any non-perfect-square is always irrational.</p>`},
{n:'v',q:`Identify: ${I('e')}`,s:`<p>Euler's number ${I('e = 2.71828182845904523536\\ldots')} cannot be expressed as a fraction. It has infinitely many nonrecurring digits after the decimal point. So ${I('e')} is <strong>irrational</strong>.</p>`},
{n:'vi',q:`Identify: ${I('\\pi')}`,s:`<p>${I('\\pi = 3.14159265358979323846\\ldots')} is <strong>irrational</strong>. Note that ${I('\\frac{22}{7}')} is just a rational approximation of ${I('\\pi')}, not its exact value.</p>`},

<h4>Radical Expressions &amp; the nth Root</h4>
<p>In ${I('\\sqrt[n]{a}')}, ${I('a')} is the radicand and ${I('n')} is the index. Exponential form: ${I('\\sqrt[n]{a} = a^{1/n}')}.</p>
<h4>Laws of Radicals</h4>
<p>${I('\\sqrt[n]{a}\\cdot\\sqrt[n]{b}=\\sqrt[n]{ab}')}, &nbsp; ${I('\\sqrt[n]{a/b}=\\sqrt[n]{a}/\\sqrt[n]{b}')}, &nbsp; ${I('(\\sqrt[n]{a})^m = a^{m/n}')}, &nbsp; ${I('(\\sqrt[n]{a})^n = a')}.</p>
<h4>Laws of Indices</h4>
<p>${I('a^m \\cdot a^n = a^{m+n}')}, &nbsp; ${I('(a^m)^n = a^{mn}')}, &nbsp; ${I('(ab)^n = a^n b^n')}, &nbsp; ${I('a^m/a^n = a^{m-n}')}, &nbsp; ${I('a^0 = 1')}.</p>
<h4>Surds &amp; Conjugates</h4>
<p>A <strong>surd</strong> is an irrational radical with a rational radicand. <strong>Conjugate surds:</strong> ${I('a+\\sqrt{b}')} and ${I('a-\\sqrt{b}')}. Their product is always rational.</p>
<h4>Rationalizing the Denominator</h4>
<p>Multiply numerator and denominator by the conjugate of the denominator to eliminate radicals.</p>`;

{n:'i',q:`Rationalize: ${I('\\dfrac{13}{4+\\sqrt{3}}')}`,s:`<p>We multiply by the conjugate of the denominator. The conjugate of ${I('4+\\sqrt{3}')} is ${I('4-\\sqrt{3}')}. This makes the denominator rational.</p>${D('\\frac{13}{4+\\sqrt{3}} \\cdot \\frac{4-\\sqrt{3}}{4-\\sqrt{3}}')}${D('= \\frac{13(4-\\sqrt{3})}{(4+\\sqrt{3})(4-\\sqrt{3})}')}${D('= \\frac{13(4-\\sqrt{3})}{4^2-(\\sqrt{3})^2}')}${D('= \\frac{13(4-\\sqrt{3})}{16-3}')}${D('= \\frac{13(4-\\sqrt{3})}{13}')}${D('= 4-\\sqrt{3}')}<p>Thus, the rationalized form is ${I('4-\\sqrt{3}')}.</p>`},

{n:'i',q:`If ${I('x = 3+\\sqrt{8}')}, find ${I('x + \\frac{1}{x}')}.`,s:`<p>Rationalize ${I('\\frac{1}{x}')}:</p>${D('\\frac{1}{3+\\sqrt{8}} \\cdot \\frac{3-\\sqrt{8}}{3-\\sqrt{8}} = \\frac{3-\\sqrt{8}}{9-8} = 3-\\sqrt{8}')}${D('x + \\frac{1}{x} = (3+\\sqrt{8}) + (3-\\sqrt{8}) = 6')}`},
{n:'ii',q:`Find ${I('x - \\frac{1}{x}')}.`,s:`<p>From part (i), we know ${I('x=3+\\sqrt{8}')} and ${I('\\frac{1}{x}=3-\\sqrt{8}')}. Subtract the second expression from the first.</p>${D('x-\\frac{1}{x} = (3+\\sqrt{8})-(3-\\sqrt{8})')}${D('= 3+\\sqrt{8}-3+\\sqrt{8}')}${D('= 2\\sqrt{8}')}${D('= 2\\cdot 2\\sqrt{2}')}${D('= 4\\sqrt{2}')}<p>Therefore, ${I('x-\\frac{1}{x}=4\\sqrt{2}')}.</p>`},
{n:'iii',q:`Find ${I('x^2 + \\frac{1}{x^2}')}.`,s:`<p>Use the identity ${I('\\left(x+\\frac{1}{x}\\right)^2 = x^2 + 2 + \\frac{1}{x^2}')}. From part (i), ${I('x+\\frac{1}{x}=6')}.</p>${D('\\left(x+\\frac{1}{x}\\right)^2 = x^2 + 2 + \\frac{1}{x^2}')}${D('6^2 = x^2 + 2 + \\frac{1}{x^2}')}${D('36 = x^2 + 2 + \\frac{1}{x^2}')}${D('x^2 + \\frac{1}{x^2} = 36 - 2')}${D('x^2 + \\frac{1}{x^2} = 34')}<p>Hence, ${I('x^2 + \\frac{1}{x^2}=34')}.</p>`},
{n:'iv',q:`Find ${I('x^2 - \\frac{1}{x^2}')}.`,s:`<p>Use the identity ${I('x^2-\\frac{1}{x^2}=\\left(x+\\frac{1}{x}\\right)\\left(x-\\frac{1}{x}\\right)')}. We already know ${I('x+\\frac{1}{x}=6')} and ${I('x-\\frac{1}{x}=4\\sqrt{2}')}. Substitute these values.</p>${D('x^2-\\frac{1}{x^2}=\\left(x+\\frac{1}{x}\\right)\\left(x-\\frac{1}{x}\\right)')}${D('= 6 \\times 4\\sqrt{2}')}${D('= 24\\sqrt{2}')}<p>Therefore, ${I('x^2-\\frac{1}{x^2}=24\\sqrt{2}')}.</p>`},
{n:'v',q:`Find ${I('x^4 + \\frac{1}{x^4}')}.`,s:`<p>Use the identity ${I('\\left(x^2+\\frac{1}{x^2}\\right)^2=x^4+2+\\frac{1}{x^4}')}. From part (iii), ${I('x^2+\\frac{1}{x^2}=34')}.</p>${D('\\left(x^2+\\frac{1}{x^2}\\right)^2=x^4+2+\\frac{1}{x^4}')}${D('34^2=x^4+2+\\frac{1}{x^4}')}${D('1156=x^4+2+\\frac{1}{x^4}')}${D('x^4+\\frac{1}{x^4}=1156-2')}${D('x^4+\\frac{1}{x^4}=1154')}<p>Hence, ${I('x^4+\\frac{1}{x^4}=1154')}.</p>`},
{n:'vi',q:`Find ${I('\\left(x - \\frac{1}{x}\\right)^2')}.`,s:`${D('\\left(x - \\frac{1}{x}\\right)^{\\!2} = (4\\sqrt{2})^2 = 32')}`}
]},

{n:'4',q:`Find rational numbers ${I('p')} and ${I('q')} such that ${I('\\dfrac{8-3\\sqrt{2}}{4+3\\sqrt{2}} = p + q\\sqrt{2}')}.`,s:`<p>To write the expression in the form ${I('p+q\\sqrt{2}')}, rationalize the denominator first. The conjugate of ${I('4+3\\sqrt{2}')} is ${I('4-3\\sqrt{2}')}. Multiply by this conjugate.</p>${D('\\frac{8-3\\sqrt{2}}{4+3\\sqrt{2}} \\cdot \\frac{4-3\\sqrt{2}}{4-3\\sqrt{2}}')}${D('= \\frac{(8-3\\sqrt{2})(4-3\\sqrt{2})}{(4+3\\sqrt{2})(4-3\\sqrt{2})}')}${D('= \\frac{32-24\\sqrt{2}-12\\sqrt{2}+18}{16-18}')}${D('= \\frac{50-36\\sqrt{2}}{-2}')}${D('= -25+18\\sqrt{2}')}<p>Now compare coefficients with ${I('p+q\\sqrt{2}')}.</p><div class="plain-block-math">${KRaw('p=-25,\\quad q=18',true)}</div><p>Therefore, the required rational numbers are ${I('p=-25')} and ${I('q=18')}.</p><details class="solution-video"><summary>Watch sample video solution</summary><div class="solution-video-body"><p class="solution-video-note">Sample embedded video solution for this question. Later, you can replace this with the exact lesson video that matches the worked solution.</p><div class="video-frame"><iframe width="560" height="315" src="https://www.youtube.com/embed/7cEoLM0AGcM?si=Q8b8ibFOJ4XdoSuK" title="YouTube video player" frameborder="0" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div></div></details>`},

const EX13=[

{n:'1',q:`The sum of three consecutive integers is 42. Find them.`,s:`<p>Let the first integer be ${I('x')}.</p><p>Since consecutive integers differ by ${I('1')}, the next two integers are ${I('x+1')} and ${I('x+2')}.</p><p>Their sum is given to be ${I('42')}.</p>${D('x + (x+1) + (x+2) = 42')}${D('x+x+x+1+2 = 42')}${D('3x+3 = 42')}<p>Subtract ${I('3')} from both sides.</p>${D('3x = 42-3 = 39')}<p>Now divide both sides by ${I('3')}.</p>${D('x = \\frac{39}{3} = 13')}<p>So the three consecutive integers are ${I('13,14,15')}.</p>`},
{n:'2',q:`In right-angled △ABC, ${I('AC = (\\sqrt{3}+\\sqrt{5})')} cm and area = ${I('(1+\\sqrt{15})')} cm². Find AB in the form ${I('(a\\sqrt{3}+b\\sqrt{5})')} cm.`,s:`<p>Area = ${I('\\frac{1}{2} \\times AC \\times AB')}:</p>${D('\\frac{1}{2}(\\sqrt{3}+\\sqrt{5})(a\\sqrt{3}+b\\sqrt{5}) = 1+\\sqrt{15}')}<p>Expanding and equating rational/irrational parts gives the system ${I('3a+5b=2')} and ${I('a+b=2')}. Solving: ${I('a=4, b=-2')}.</p>${D('AB = (4\\sqrt{3} - 2\\sqrt{5})\\text{ cm}')}`},

{n:'5',q:`Temperature in Lahore was 48°C. Convert to Fahrenheit.`,s:`<p>We use the Fahrenheit conversion formula ${I('{}^\\circ\\!F = \\frac{9}{5}\\,{}^\\circ\\!C + 32')}.</p><p>Here the Celsius temperature is ${I('48{}^\\circ\\!C')}, so we substitute ${I('48')} in place of ${I('{}^\\circ\\!C')}.</p>${D('{}^\\circ\\!F = \\frac{9}{5} \\times 48 + 32')}${D('{}^\\circ\\!F = \\frac{432}{5} + 32')}${D('{}^\\circ\\!F = 86.4 + 32')}${D('{}^\\circ\\!F = 118.4')}<p>Therefore, the temperature in Fahrenheit is <strong>${I('118.4{}^\\circ\\!F')}</strong>.</p>`},
{n:'6',q:`Father and son's ages sum to 72. Six years ago, father was twice the son's age. Find son's age 6 years ago.`,s:`<p>Let the father's present age be ${I('f')} years and the son's present age be ${I('s')} years.</p><p><strong>Given:</strong> Their present ages add up to ${I('72')}.</p>${D('f+s = 72')}<p>Six years ago, father was twice the son's age. So:</p>${D('f-6 = 2(s-6)')}<p>Now simplify the second equation.</p>${D('f-6 = 2s-12')}${D('f = 2s-6')}<p>Put this value of ${I('f')} into ${I('f+s=72')}.</p>${D('(2s-6)+s = 72')}${D('3s-6 = 72')}${D('3s = 72+6 = 78')}${D('s = \\frac{78}{3} = 26')}<p>This is the son's present age. Therefore, six years ago his age was</p>${D('26-6 = 20')}<p>Therefore, the son's age 6 years ago was <strong>20 years</strong>.</p>`},

function toggleAnswerKey(id, btn){
 const box=document.getElementById(id);
 if(!box) return;
 const isDetails = box.tagName && box.tagName.toLowerCase()==='details';
 const show = isDetails ? !box.open : !box.classList.contains('show');
 if(isDetails) box.open = show;
 else box.classList.toggle('show', show);
 if(btn) btn.textContent = show ? 'Hide answer key' : 'Show answer key';
}

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function selectBank(arr, topic){ return topic==='all' ? arr : arr.filter(item=>item.topic===topic); }

function paperMeta(items){
 return `<div class="paper-meta">${items.map(item=>`<div class="paper-meta-card"><div class="paper-meta-label">${item.label}</div><div class="paper-meta-value">${item.value}</div></div>`).join('')}</div>`;
}
function paperOption(content, idx){
 return `<div class="paper-option"><span class="paper-letter">${String.fromCharCode(97+idx)}</span><div class="paper-option-text">${content}</div></div>`;
}
function paperQuestion(num, prompt, body='', kind='plain', trackLabel=''){
 const bodyHtml = body ? `<div class="paper-question-body">${body}</div>` : '';
 const trackAttr = trackLabel ? ` data-track-question="${escHtml(trackLabel)}"` : '';
 return `<div class="paper-question trackable-question ${kind}"${trackAttr}><div class="paper-question-main">${badgeMarkup(num,'paper-qnum')}<div class="paper-question-text">${prompt}</div></div>${bodyHtml}</div>`;
}
function paperSection(code, title, note, body){
 return `<section class="paper-section"><div class="paper-section-head"><div class="paper-section-code">${code}</div><div><h3>${title}</h3><p>${note}</p></div></div><div class="paper-section-body">${body}</div></section>`;
}

 const nl=+document.getElementById('gl').value||0;

 let mp=[],sp=[],lp=[];
 if(d==='easy'){mp.push(...QB.mcq.easy);sp.push(...QB.short.easy);lp.push(...QB.long.easy)}
 if(d==='medium'){mp.push(...QB.mcq.medium);sp.push(...QB.short.medium);lp.push(...QB.long.medium)}
 if(d==='hard'){mp.push(...QB.mcq.hard);sp.push(...QB.short.hard);lp.push(...QB.long.hard)}
 if(d==='mixed'){mp.push(...QB.mcq.easy,...QB.mcq.medium,...QB.mcq.hard);sp.push(...QB.short.easy,...QB.short.medium,...QB.short.hard);lp.push(...QB.long.easy,...QB.long.medium,...QB.long.hard)}
 mp=selectBank(mp,topic); sp=selectBank(sp,topic); lp=selectBank(lp,topic);
 const sm=shuf(mp).slice(0,nm), ss=shuf(sp).slice(0,ns), sl=shuf(lp).slice(0,nl);

 let h=`<div class="gout paper-frame" style="margin-top:24px"><h3 class="paper-headline">Generated Practice Paper</h3><div class="paper-subline">Unit 1, Real Numbers</div>`;
 h+=paperMeta([

 ]);
 h+=`<div class="paper-note">This generated paper follows the same visual system as the main chapter and the unit test. Print it and attempt it like an ordinary practice paper.</div>`;
 if(sm.length){

   h+=paperSection('A','Multiple-Choice Questions',`${sm.length} question${sm.length===1?'':'s'}, 1 mark each.`, body);
 }
 if(ss.length){
   let body='';
   ss.forEach((q,i)=>{ body += paperQuestion(i+1, q.q, '', 'plain', `Section B, Question ${i+1}`); });
   h+=paperSection('B','Short Questions',`${ss.length} question${ss.length===1?'':'s'}, 2 marks each.`, body);
 }
 if(sl.length){
   let body='';
   sl.forEach((q,i)=>{ body += paperQuestion(i+1, q.q, '', 'plain', `Section C, Question ${i+1}`); });
   h+=paperSection('C','Long Questions',`${sl.length} question${sl.length===1?'':'s'}, 8 marks each.`, body);
 }
 h+=`<div class="paper-actions"><button class="rbtn" onclick="genTest()">Regenerate paper</button><button class="abtn" onclick="toggleAnswerKey('ak', this)">Show answer key</button><button class="abtn" onclick="printNode(document.querySelector('#gout .paper-frame'),'Generated Practice Paper - Unit 1')">Print generated paper</button></div>`;
 h+=`<details class="paper-answer-key" id="ak"><summary>Generated answer key</summary><div class="paper-answer-body">`;
 if(sm.length){ h+=`<div class="paper-answer-title">Section A</div><div class="paper-key-grid">${sm.map((m,i)=>`<div class="paper-key-item"><span class="paper-qnum" style="font-size:.76rem">${i+1}</span><span class="paper-letter">${L[m.ans]}</span></div>`).join('')}</div>`; }
 if(ss.length){ h+=`<div class="paper-answer-title">Section B</div>${ss.map((q,i)=>`<div class="paper-answer-item"><p><strong>${i+1}.</strong></p>${q.a}</div>`).join('')}`; }
 if(sl.length){ h+=`<div class="paper-answer-title">Section C</div>${sl.map((q,i)=>`<div class="paper-answer-item"><p><strong>${i+1}.</strong></p>${q.a}</div>`).join('')}`; }
 h+=`</div></details></div>`;
 document.getElementById('gout').innerHTML=h;
 renderMath(document.getElementById('gout'));
 document.getElementById('gout').scrollIntoView({behavior:'smooth',block:'start'});
 scheduleViewportTracker();
}

function tikzWrap(svg){ return `<div class="tikz-wrap">${svg}</div>`; }

function printNode(nodeOrSelector,title){
 const node = typeof nodeOrSelector==='string' ? document.querySelector(nodeOrSelector) : nodeOrSelector;
 if(!node) return;
 const clone = node.cloneNode(true);
 clone.querySelectorAll('.qh-tools,.ph-tools,.test-tools,.tool-btn,.qg,.test-answer-key').forEach(el=>el.remove());
 clone.querySelectorAll('.qb,.concepts').forEach(el=>el.classList.add('open'));
 const headBits = [...document.head.children]
 .filter(el => ['STYLE','LINK','META'].includes(el.tagName))
 .map(el => el.outerHTML)
 .join('');
 const win = window.open('about:blank', '_blank', 'width=980,height=1200');
 if(!win) return;
 win.document.write(`<!DOCTYPE html><html><head>${headBits}<style>body{background:#fff;padding:20px} .jumpbar,.top,.intro-tools,.footer-note{display:none!important} .qb,.concepts,.test-block,.gout .ts,.gout .th{box-shadow:none!important} .qs{max-height:none!important}

/* mobile-first header and viewport indicator */
.topin{max-width:1040px;margin:0 auto;padding:12px 14px;display:grid;gap:10px}
.topbar{display:block}
.brand{font-size:1.12rem;line-height:1.15}
.view-indicator{display:none!important}
.vi-label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.vi-section{font-size:.95rem;font-weight:700;color:var(--accent);line-height:1.2}
.vi-question{font-size:.86rem;color:#4f4a43;line-height:1.25;word-break:break-word}
.view-indicator.no-question .vi-question{display:none}
.topnav{display:flex;flex-wrap:nowrap;gap:8px;overflow:auto;padding-bottom:2px;scrollbar-width:thin}
.topnav a{flex:none;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.76);border:1px solid var(--line);font-size:.9rem;color:#4f4a43;transition:all .18s ease}
.topnav a:hover,.topnav a.current{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
#matchCount{flex:none;display:none;align-items:center;justify-content:center;padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:.82rem;color:var(--muted);white-space:nowrap}
#matchCount:not(:empty){display:inline-flex}
.jumpbar a.current{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700}
@media (min-width:760px){

function filterQuestions(q){
 q = (q || '').trim().toLowerCase();
 const targets = [...document.querySelectorAll('.qb, .concepts, .test-block, .gout .ts, .gout .th')];
 let visible = 0;
 targets.forEach(el => {
 const text = el.textContent.toLowerCase();
 const hit = !q || text.includes(q);
 el.style.display = hit ? '' : 'none';
 if(hit) visible++;
 if(hit && q && (el.classList.contains('qb') || el.classList.contains('concepts'))) el.classList.add('open');
 if(!q && (el.classList.contains('qb') || el.classList.contains('concepts'))) el.classList.remove('open');
 });
 // hide section labels with no visible content after them
 document.querySelectorAll('.sl').forEach(label => {
 let sib = label.nextElementSibling;
 let hasVisible = false;
 while(sib && !sib.classList.contains('sl') && !sib.classList.contains('ph')) {
 if(sib.style.display !== 'none') { hasVisible = true; break; }
 sib = sib.nextElementSibling;
 }
 label.style.display = (!q || hasVisible) ? '' : 'none';
 });
 const count = document.getElementById('matchCount');
 if(count) count.textContent = q ? `${visible} matches` : '';
 const note = document.getElementById('searchNote');
 if(note) {
 note.innerHTML = q ? (visible ? `<strong>${visible}</strong> matching blocks found for “${q}”. Matching question cards are opened automatically.` : `No matching blocks found for “${q}”.`) : 'Search works across questions, solutions, concepts, review material, and the unit test.';
 }
}

let viewportTrackerFrame=0;
function scheduleViewportTracker(){
 if(viewportTrackerFrame) return;
 viewportTrackerFrame = requestAnimationFrame(()=>{
  viewportTrackerFrame = 0;
  updateViewportTracker();
 });
}
function updateViewportTracker(){
 const sections=[...document.querySelectorAll('.chapter-flow > section')];
 if(!sections.length) return;
 const header=document.querySelector('.top');
 const probeY=(header?header.getBoundingClientRect().height:0)+18;
 let activeSection=sections[0];
 for(const sec of sections){
  const r=sec.getBoundingClientRect();
  if(r.top <= probeY && r.bottom > probeY){ activeSection=sec; break; }
  if(r.top <= probeY) activeSection=sec;
 }
 const items=[...activeSection.querySelectorAll('[data-track-question]')].filter(el=>el.offsetParent!==null);
 let activeQuestion=null;
 for(const item of items){
  const r=item.getBoundingClientRect();
  if(r.top <= probeY+34 && r.bottom > probeY+8){ activeQuestion=item; break; }
  if(r.top <= probeY+34) activeQuestion=item;
 }
 if(!activeQuestion){
  activeQuestion = items.find(item=>item.getBoundingClientRect().top > probeY) || items[0] || null;
 }
 const sectionLabel=activeSection.dataset.trackLabel || activeSection.querySelector('h2,h3')?.textContent?.trim() || 'Unit 1';
 const questionLabel=activeQuestion ? activeQuestion.dataset.trackQuestion || '' : 'Overview';
 setViewportContext(sectionLabel, questionLabel);
 updateActiveNav(activeSection.id);
}
function installViewportTracker(){
 window.addEventListener('scroll', scheduleViewportTracker, {passive:true});
 window.addEventListener('resize', scheduleViewportTracker);
 scheduleViewportTracker();
}
